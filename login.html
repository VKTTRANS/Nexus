<div id="view-login" class="view-section active">
  <div class="d-flex justify-content-center align-items-center vh-100 position-relative overflow-hidden">
    
    <style>
      @keyframes floatBlob1 { 
        0% { transform: translate(0, 0) scale(1) rotate(0deg); } 
        33% { transform: translate(30px, -50px) scale(1.2) rotate(10deg); } 
        66% { transform: translate(-20px, 20px) scale(0.9) rotate(-10deg); } 
        100% { transform: translate(0, 0) scale(1) rotate(0deg); } 
      }
      @keyframes floatBlob2 { 
        0% { transform: translate(0, 0) scale(1); } 
        50% { transform: translate(-40px, 40px) scale(1.1); } 
        100% { transform: translate(0, 0) scale(1); } 
      }
      @keyframes floatBlob3 { 
        0% { transform: translate(0, 0) scale(0.8); } 
        50% { transform: translate(40px, 20px) scale(1.2); } 
        100% { transform: translate(0, 0) scale(0.8); } 
      }

      .blob { 
        position: absolute; 
        border-radius: 50%; 
        filter: blur(80px); 
        opacity: 0.5; 
        z-index: 1;
      }
      .blob-1 {
        width: 400px; height: 400px; background: rgba(0, 230, 118, 0.15); 
        top: -100px; left: -100px;
        animation: floatBlob1 12s infinite ease-in-out;
      }
      .blob-2 {
        width: 350px; height: 350px; background: rgba(0, 200, 83, 0.12); 
        bottom: -50px; right: -50px; 
        animation: floatBlob2 10s infinite ease-in-out reverse;
      }
      .blob-3 {
        width: 250px; height: 250px; background: rgba(0, 230, 118, 0.1); 
        top: 40%; left: 30%; 
        animation: floatBlob3 15s infinite ease-in-out;
      }

      .bg-grid {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
          linear-gradient(rgba(0, 230, 118, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 230, 118, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.4;
        z-index: 0;
        animation: panGrid 20s linear infinite;
      }
      @keyframes panGrid {
        0% { background-position: 0 0; }
        100% { background-position: 40px 40px; }
      }

      .glass-shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 2;
        bottom: -150px;
        animation: floatUpShape linear infinite;
      }
      .shape-circle { border-radius: 50%; }
      .shape-square { border-radius: 20px; transform: rotate(45deg); }

      @keyframes floatUpShape {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
      }

      .shape-1 { width: 80px; height: 80px; left: 10%; animation-duration: 15s; animation-delay: 2s; }
      .shape-2 { width: 120px; height: 120px; left: 75%; animation-duration: 25s; animation-delay: 0s; }
      .shape-3 { width: 50px; height: 50px; left: 45%; animation-duration: 12s; animation-delay: 5s; }
      .shape-4 { width: 90px; height: 90px; left: 85%; animation-duration: 18s; animation-delay: 7s; }
      .shape-5 { width: 60px; height: 60px; left: 25%; animation-duration: 22s; animation-delay: 1s; }
      .shape-6 { width: 150px; height: 150px; left: 55%; animation-duration: 30s; animation-delay: 4s; }

      @keyframes cardSlideUp {
        from { opacity: 0; transform: translateY(50px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .login-card-animated {
        animation: cardSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes iconPulse {
        0% { box-shadow: 0 0 15px rgba(0, 230, 118, 0.3); }
        50% { box-shadow: 0 0 35px rgba(0, 230, 118, 0.7); }
        100% { box-shadow: 0 0 15px rgba(0, 230, 118, 0.3); }
      }
      .icon-glow-animated {
        animation: iconPulse 3s infinite ease-in-out;
      }

      .login-input {
        background: rgba(255,255,255,0.05) !important; 
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: #ffffff !important;
        transition: all 0.3s ease;
      }
      .login-input:focus {
        background: rgba(0, 0, 0, 0.4) !important;
        border-color: #00E676 !important;
        box-shadow: 0 0 15px rgba(0, 230, 118, 0.25) !important;
        transform: translateY(-2px);
      }

      .btn-login-animated {
        background: linear-gradient(135deg, #00E676, #00C853);
        border: none;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .btn-login-animated:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 230, 118, 0.4) !important;
      }
      .btn-login-animated i {
        transition: transform 0.3s ease;
      }
      .btn-login-animated:hover i {
        transform: translateX(5px);
      }
    </style>
    
    <div class="bg-grid"></div>
    <div class="glass-shape shape-square shape-1"></div>
    <div class="glass-shape shape-circle shape-2"></div>
    <div class="glass-shape shape-square shape-3"></div>
    <div class="glass-shape shape-circle shape-4"></div>
    <div class="glass-shape shape-square shape-5"></div>
    <div class="glass-shape shape-circle shape-6"></div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card p-5 border-0 shadow-lg text-center position-relative login-card-animated" 
         style="width: 400px; background: rgba(20, 20, 20, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); z-index: 10;">
      
      <div class="mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3 rounded-circle position-relative icon-glow-animated" 
             style="width: 85px; height: 85px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0,230,118,0.3);">
           <i class="bi bi-shield-lock-fill text-success" style="font-size: 2.5rem; filter: drop-shadow(0 0 8px rgba(0,230,118,0.6));"></i>
        </div>
        <h3 class="fw-bold text-white mb-1" style="letter-spacing: 1.5px;">VKT NEXUS</h3>
        <p class="text-secondary small">ระบบจัดการฐานข้อมูลพนักงาน</p>
      </div>
      
      <form onsubmit="performLogin(event)">
        <div class="form-floating mb-3">
          <input type="text" class="form-control login-input" id="loginUser" placeholder="Username" required>
          <label for="loginUser" class="text-muted"><i class="bi bi-person me-2"></i>ชื่อผู้ใช้งาน</label>
        </div>
        <div class="form-floating mb-4">
          <input type="password" class="form-control login-input" id="loginPass" placeholder="Password" required>
          <label for="loginPass" class="text-muted"><i class="bi bi-key me-2"></i>รหัสผ่าน</label>
        </div>
        
        <button type="submit" class="btn btn-login-animated w-100 py-3 rounded-pill fw-bold shadow-sm text-dark" style="font-size: 1.1rem;">
           เข้าสู่ระบบ <i class="bi bi-arrow-right-short ms-1 fs-5 d-inline-block align-middle"></i>
        </button>
      </form>
      
      <div class="mt-4 text-muted small opacity-25 font-monospace">
         © 2026 VKT Transport System
      </div>
    </div>
  </div>
</div>

<script>
  function checkAutoLogin() {
    if (typeof AUTO_FILLED_USER !== 'undefined' && AUTO_FILLED_USER && AUTO_FILLED_USER.trim() !== "") {
      
      var uInput = document.getElementById('loginUser');
      var pInput = document.getElementById('loginPass');
      
      if (uInput) {
        uInput.value = AUTO_FILLED_USER;
        
        uInput.style.borderColor = '#00E676';
        uInput.style.boxShadow = '0 0 15px rgba(0, 230, 118, 0.3)';
        uInput.style.transform = 'translateY(-2px)';
        
        Swal.fire({
          toast: true,
          position: 'top',
          icon: 'success',
          title: 'พบข้อมูลพนักงาน: ' + AUTO_FILLED_USER,
          text: 'กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน',
          showConfirmButton: false,
          timer: 3000,
          background: 'rgba(20,20,20,0.95)',
          color: '#fff',
          iconColor: '#00E676'
        });

        if (pInput) {
           setTimeout(function() {
               pInput.value = '';
               pInput.focus();
           }, 500);
        }
      }
      
      AUTO_FILLED_USER = ""; 
    }
  }

  async function performLogin(e) {
    e.preventDefault(); 
    Swal.fire({
        title: 'กำลังตรวจสอบ...', 
        text: 'กรุณารอสักครู่',
        background: 'rgba(20,20,20,0.95)', 
        color: '#fff', 
        allowOutsideClick: false,
        didOpen: function() { Swal.showLoading(); }
    });
    
    var u = document.getElementById('loginUser').value;
    var p = document.getElementById('loginPass').value;

    try {
      const res = await callAPI({ action: 'loginUser', username: u, password: p });
      Swal.close();
      if(res.success){ 
        currentUser = res; 
        try { localStorage.setItem('hr_user_session', JSON.stringify(res)); } catch(err) {}
        
        if(res.role === 'Admin' || res.role === 'Viewer') { 
            switchView('view-admin'); 
            if(typeof loadAdminData === 'function') loadAdminData(); 
        } else { 
            switchView('view-user'); 
            if(typeof loadUserData === 'function') loadUserData();
        }
      } else { 
          Swal.fire({
              icon: 'error', 
              title: 'เข้าสู่ระบบไม่สำเร็จ', 
              text: res.message, 
              background: 'rgba(20,20,20,0.95)', 
              color: '#fff',
              confirmButtonColor: '#d33'
          }); 
      }
    } catch(err) {
      // Error is handled by callAPI
    }
  }
</script>
